services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sismo-api
    ports:
      - "8000:8000"
    volumes:
      - earthquake-data:/data
    environment:
      EARTHQUAKE_DB_FILE: /data/earthquakes.sqlite3
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  earthquake-data:
